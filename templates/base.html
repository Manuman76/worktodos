<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const stored = localStorage.getItem('theme');
            const theme = stored === 'dark' || stored === 'light'
                ? stored
                : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <title>{% block title %}Work Todos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        :root,
        [data-bs-theme="light"] {
            --app-bg-start: #f8f9fa;
            --app-bg-end: #e9ecef;
            --editor-bg: #fff;
            --quill-stroke: #ccc;
            --quill-fill: #444;
            --quill-toolbar-bg: #f8f9fa;
        }
        [data-bs-theme="dark"] {
            --app-bg-start: #1a1d21;
            --app-bg-end: #0d1117;
            --editor-bg: #212529;
            --quill-stroke: #495057;
            --quill-fill: #dee2e6;
            --quill-toolbar-bg: #343a40;
        }
        body {
            background: linear-gradient(135deg, var(--app-bg-start) 0%, var(--app-bg-end) 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .todo-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .todo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08) !important;
        }
        .todo-card.todo-sortable-drag,
        .todo-card.todo-sortable-drag:hover,
        .todo-item.todo-sortable-drag .todo-card,
        .todo-item.todo-sortable-drag .todo-card:hover {
            transform: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.12) !important;
        }
        .todo-sortable-ghost,
        .todo-item.todo-sortable-ghost {
            opacity: 0.45;
        }
        .drag-handle {
            cursor: grab;
            line-height: 1;
            margin-top: 0.15rem;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .drag-handle:hover {
            color: var(--bs-primary) !important;
        }
        .todo-title.completed {
            text-decoration: line-through;
            color: #6c757d;
        }
        .todo-description {
            line-height: 1.6;
        }
        .todo-description p:last-child {
            margin-bottom: 0;
        }
        #editor,
        #quick-notes-editor {
            background: var(--editor-bg);
        }
        #editor {
            min-height: 200px;
        }
        .ql-toolbar.ql-snow {
            border-top-left-radius: 0.375rem;
            border-top-right-radius: 0.375rem;
            background: var(--quill-toolbar-bg);
            border-color: var(--quill-stroke);
        }
        .ql-container.ql-snow {
            border-bottom-left-radius: 0.375rem;
            border-bottom-right-radius: 0.375rem;
            border-color: var(--quill-stroke);
            color: var(--bs-body-color);
        }
        .ql-editor.ql-blank::before {
            color: var(--bs-secondary-color);
        }
        .ql-snow .ql-stroke {
            stroke: var(--quill-fill);
        }
        .ql-snow .ql-fill {
            fill: var(--quill-fill);
        }
        .ql-snow .ql-picker {
            color: var(--quill-fill);
        }
        .ql-snow .ql-picker-options {
            background: var(--bs-body-bg);
            border-color: var(--quill-stroke);
        }
        .filter-pills .nav-link {
            border-radius: 2rem;
            padding: 0.35rem 1rem;
        }
        .category-filter-menu {
            min-width: 14rem;
            max-height: 16rem;
            overflow-y: auto;
        }
        .category-filter-menu .dropdown-item {
            cursor: pointer;
        }
        .tag-badge {
            font-size: 0.75rem;
            font-weight: 500;
        }
        .index-layout {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }
        .index-main {
            flex: 0 0 70%;
            max-width: 70%;
            min-width: 0;
        }
        .index-notes {
            flex: 0 0 calc(30% - 1.5rem);
            max-width: calc(30% - 1.5rem);
            min-width: 0;
        }
        .quick-notes-card {
            position: sticky;
            top: 1rem;
        }
        #quick-notes-editor {
            min-height: 420px;
        }
        .theme-toggle .theme-icon-dark {
            display: none;
        }
        [data-bs-theme="dark"] .theme-toggle .theme-icon-light {
            display: none;
        }
        [data-bs-theme="dark"] .theme-toggle .theme-icon-dark {
            display: inline;
        }
        .quick-notes-card .ql-container.ql-snow {
            min-height: 360px;
        }
        @media (max-width: 991.98px) {
            .index-layout {
                flex-direction: column;
            }
            .index-main,
            .index-notes {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .quick-notes-card {
                position: static;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="{% block nav_class %}container{% endblock %}">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-check2-square me-2"></i>Work Todos
            </a>
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-outline-light btn-sm theme-toggle" id="theme-toggle"
                        aria-label="Toggle dark mode" title="Toggle theme">
                    <i class="bi bi-sun theme-icon-light"></i>
                    <i class="bi bi-moon-stars theme-icon-dark"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="{% block main_class %}container{% endblock %} pb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('theme-toggle').addEventListener('click', function () {
            const root = document.documentElement;
            const next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
